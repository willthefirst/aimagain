# Pre-commit configuration for code quality checks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    # Keep in sync with the black version installed via pyproject.toml so
    # pre-commit and `dev lint`/CI agree on style. Version drift caused one
    # CI flap on PR #73 — pre-commit's older black approved a file that
    # CI's newer black rejected.
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort

  - repo: https://github.com/PyCQA/autoflake
    rev: v2.0.1
    hooks:
      - id: autoflake
        args: [--remove-all-unused-imports, --in-place]

  - repo: local
    hooks:
      - id: title-case-check
        name: Check title case
        entry: python scripts/dev/title_case_check.py
        language: python
        files: \.(md|html|jinja|jinja2)$
        pass_filenames: true
        args: [--fix]
