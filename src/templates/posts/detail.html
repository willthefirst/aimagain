{% extends "base.html" %}
{% block title %}Post: {{ post.title }}{% endblock %}
{% block content %}
<h1>{{ post.title }}</h1>
<p>by <a href="/users/{{ post.owner_id }}">{{ post.owner.username }}</a></p>

<div class="post-body">{{ post.body }}</div>

{% include "posts/_owner_actions.html" %}

<hr />
<a href="/posts">Back to posts</a>
{% endblock %}
