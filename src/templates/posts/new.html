{% extends "base.html" %}
{% block title %}New post{% endblock %}
{% block content %}
<h1>New post</h1>
<p class="hint">
  Posts are public to other authenticated users. Never include personally
  identifying information about clients.
</p>

<form hx-post="/posts" hx-ext="json-enc">
  <fieldset>
    <legend>Kind</legend>
    <label>
      <input type="radio" name="kind" value="client_referral" checked />
      Client referral
    </label>
    <label>
      <input type="radio" name="kind" value="provider_availability" />
      Provider availability
    </label>
  </fieldset>
  <br />
  <input type="submit" value="Create post" />
</form>

<hr />
<a href="/posts">Back to posts</a>
{% endblock %}
