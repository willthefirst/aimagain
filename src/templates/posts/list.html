{% extends "base.html" %}
{% block title %}Posts{% endblock %}
{% block content %}
<h1>Posts</h1>

{% if posts %}
<ul>
  {% for post in posts %}
  <li>
    <a href="/posts/{{ post.id }}">{{ post.title }}</a>
    by <a href="/users/{{ post.owner_id }}">{{ post.owner.username }}</a>
  </li>
  {% endfor %}
</ul>
{% else %}
<p>No posts found.</p>
{% endif %}

<hr />
<a href="/posts">Refresh list</a>
{% endblock %}
