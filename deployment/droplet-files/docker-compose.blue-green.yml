services:
  bedlam-connect-blue:
    image: ghcr.io/willthefirst/bedlam-connect:latest
    container_name: bedlam-connect-blue
    restart: unless-stopped
    ports:
      - '8001:8000'
    volumes:
      - /opt/bedlam-connect/data:/app/data
    env_file:
      - /opt/bedlam-connect/config/.env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bedlam-connect-green:
    image: ghcr.io/willthefirst/bedlam-connect:latest
    container_name: bedlam-connect-green
    restart: unless-stopped
    ports:
      - '8002:8000'
    volumes:
      - /opt/bedlam-connect/data:/app/data
    env_file:
      - /opt/bedlam-connect/config/.env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
